<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zirve Premium v900</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* İSTEDİĞİN O BÜYÜK BAŞLAT BUTONU */
        #playBtn {
            position: absolute;
            width: 120px; height: 120px;
            background: rgba(229, 9, 20, 0.95);
            border-radius: 50%;
            border: 5px solid #fff;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 100;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.7);
            transition: all 0.3s;
        }
        /* Başlat ikon üçgeni */
        #playBtn::after {
            content: '';
            width: 0; height: 0;
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-left: 45px solid #fff;
            margin-left: 15px;
        }
        #playBtn:hover { transform: scale(1.1); background: #ff0000; }
        
        #loading { color: white; position: absolute; font-family: sans-serif; display: none; }
    </style>
</head>
<body>

    <div id="loading">BAĞLANILIYOR...</div>
    <div id="playBtn"></div>
    <video id="video" playsinline></video>

    <script>
        const video = document.getElementById('video');
        const playBtn = document.getElementById('playBtn');
        const loading = document.getElementById('loading');
        const source = "https://mpu.zirvedesin216.cfd/zirve/mono.m3u8";

        function startProPlayer() {
            if (Hls.isSupported()) {
                const hls = new Hls({
                    debug: false,
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 90,
                    // NETWORK ERROR ÇÖZÜCÜ AYARLAR
                    xhrSetup: function(xhr) {
                        xhr.withCredentials = false;
                    },
                    manifestLoadingMaxRetry: 10,
                    levelLoadingMaxRetry: 10
                });

                hls.loadSource(source);
                hls.attachMedia(video);

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.log("Ağ hatası! Tekrar deneniyor...");
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = source;
            }
        }

        // Başlat Butonu İşlemi
        playBtn.addEventListener('click', () => {
            playBtn.style.display = 'none';
            loading.style.display = 'block';
            startProPlayer();
            video.play().catch(() => {
                loading.innerText = "HATA: TV İZNİ GEREKLİ!";
            });
        });

        video.addEventListener('playing', () => { loading.style.display = 'none'; });

        // Kumanda OK Tuşu Desteği
        document.addEventListener('keydown', (e) => {
            if (e.keyCode === 13) {
                if (playBtn.style.display !== 'none') {
                    playBtn.click();
                } else {
                    video.paused ? video.play() : video.pause();
                }
            }
        });
    </script>
</body>
</html>
