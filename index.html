<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zirve Player - Her Platformda Çalışır</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body, html { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
    #video { width:100vw; height:100vh; object-fit:contain; }
    .controls { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); padding:10px 20px; border-radius:10px; color:white; font-family:Arial; }
  </style>
</head>
<body>
  <video id="video" controls autoplay playsinline></video>
  
  <div class="controls">
    <input type="text" id="url" value="https://ejr.zirvedesin218.cfd/zirve/mono.m3u8" style="width:500px; max-width:90%; padding:8px; color:black;">
    <button onclick="load()" style="padding:8px 15px;">Yükle</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const urlInput = document.getElementById('url');
    
    function load() {
      const url = urlInput.value.trim() || urlInput.getAttribute('value');
      
      if (Hls.isSupported()) {
        if (window.currentHls) window.currentHls.destroy();
        window.currentHls = new Hls({
          enableWorker: true,
          lowLatencyMode: true,
          backBufferLength: 90
        });
        window.currentHls.loadSource(url);
        window.currentHls.attachMedia(video);
        window.currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
      } 
      else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play();
      }
    }
    
    // Sayfa açılır açılmaz otomatik başlat
    load();
    
    // Klavye kısayolları (isteğe bağlı)
    document.addEventListener('keydown', e => {
      if (e.key === 'F') video.requestFullscreen();
      if (e.key === ' ') { e.preventDefault(); video.paused ? video.play() : video.pause(); }
    });
  </script>
</body>
</html>
