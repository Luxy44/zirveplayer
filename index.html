<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zirve Premium Player</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #player { width: 100vw; height: 100vh; }
        
        /* İSTEDİĞİN O BÜYÜK KIRMIZI BAŞLAT BUTONU */
        .play-wrapper svg { 
            width: 120px !important; 
            height: 120px !important; 
            fill: #e50914 !important; /* Netflix Kırmızısı */
            filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.5));
        }
        .player-poster[data-poster] { background-size: cover !important; }
    </style>
</head>
<body>

    <div id="player"></div>

    <script>
        var player = new Clappr.Player({
            source: "https://mpu.zirvedesin216.cfd/zirve/mono.m3u8",
            parentId: "#player",
            width: '100%',
            height: '100%',
            autoPlay: false, // TV'de butonu görmek için false
            preload: 'auto',
            mimeType: "application/x-mpegURL",
            mediacontrol: {seekbar: "#e50914", buttons: "#e50914"},
            // LG WebOS ve CORS Engellerini Aşma Ayarları
            playback: {
                hlsjsConfig: {
                    enableWorker: true,
                    lowLatencyMode: true,
                    xhrSetup: function(xhr, url) {
                        xhr.withCredentials = false; // Güvenlik duvarını yumuşatır
                    }
                }
            },
            events: {
                onReady: function() {
                    console.log("Player Hazır");
                },
                onError: function(e) {
                    // Hata olursa 3 saniye sonra otomatik yeniden yükle
                    setTimeout(function() {
                        player.configure({source: "https://mpu.zirvedesin216.cfd/zirve/mono.m3u8"});
                    }, 3000);
                }
            }
        });

        // TV Kumandası OK tuşu desteği
        document.addEventListener('keydown', function(e) {
            if (e.keyCode == 13) { 
                if (player.isPlaying()) { player.pause(); } else { player.play(); }
            }
        });
    </script>
</body>
</html>
