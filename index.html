<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zirve Premium Player</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.min.css" rel="stylesheet" />
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .video-js { width: 100vw !important; height: 100vh !important; }

        /* MERKEZDEKİ BÜYÜK BAŞLAT BUTONU */
        .vjs-big-play-button {
            width: 100px !important;
            height: 100px !important;
            line-height: 100px !important;
            border-radius: 50% !important;
            background-color: rgba(229, 9, 20, 0.9) !important; /* Kırmızı */
            border: 3px solid #fff !important;
            left: 50% !important;
            top: 50% !important;
            margin-left: -50px !important;
            margin-top: -50px !important;
            font-size: 3.5em !important;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            cursor: pointer;
        }

        .vjs-control-bar { background: rgba(0,0,0,0.7) !important; }
    </style>
</head>
<body>

    <video id="lg-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
        <source src="https://mpu.zirvedesin216.cfd/zirve/mono.m3u8" type="application/vnd.apple.mpegurl">
    </video>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        var video = document.getElementById('lg-player');
        
        // LG WebOS Tarayıcı Kısıtlamalarını Aşma Ayarları
        var player = videojs('lg-player', {
            autoplay: false,
            responsive: true,
            fluid: true,
            html5: {
                vhs: { 
                    overrideNative: true,
                    allowSeeksWithinUnsafeLiveWindow: true
                },
                nativeAudioTracks: false,
                nativeVideoTracks: false
            }
        });

        // Kumanda OK Tuşu İle Oynat/Duraklat
        document.addEventListener('keydown', function(e) {
            if(e.keyCode == 13) { 
                if(player.paused()) { player.play(); } else { player.pause(); }
            }
        });

        // Hata durumunda (Media could not be loaded) otomatik yenileme
        player.on('error', function() {
            console.log("Yayın yüklenemedi, tekrar deneniyor...");
            setTimeout(function() {
                player.src({ src: 'https://mpu.zirvedesin216.cfd/zirve/mono.m3u8', type: 'application/vnd.apple.mpegurl' });
                player.load();
            }, 3000);
        });
    </script>
</body>
</html>
