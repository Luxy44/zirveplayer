<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zirve Premium Player</title>
    
    <link href="https://vjs.zencdn.net/8.3.0/video-js.min.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .video-js { width: 100vw !important; height: 100vh !important; }

        /* İSTEDİĞİN O BÜYÜK BAŞLAT BUTONU */
        .vjs-big-play-button {
            width: 100px !important;
            height: 100px !important;
            line-height: 100px !important;
            border-radius: 50% !important;
            background-color: rgba(229, 9, 20, 0.9) !important; /* Netflix Kırmızısı */
            border: 3px solid #fff !important;
            left: 50% !important;
            top: 50% !important;
            margin-left: -50px !important;
            margin-top: -50px !important;
            font-size: 3.5em !important;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }
        .vjs-big-play-button:hover { transform: scale(1.1); background-color: #ff0000 !important; }
        
        /* TV'de imleç belirginliği için */
        .vjs-control-bar { font-size: 1.2em; }
    </style>
</head>
<body>

    <video id="zirve-player" class="video-js vjs-theme-fantasy vjs-big-play-centered" controls preload="auto">
        <source src="https://mpu.zirvedesin216.cfd/zirve/mono.m3u8" type="application/x-mpegURL">
    </video>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        var video = document.getElementById('zirve-player');
        var player = videojs('zirve-player', {
            autoplay: false,
            responsive: true,
            fluid: true,
            liveui: true,
            html5: {
                vhs: { overrideNative: true },
                nativeAudioTracks: false,
                nativeVideoTracks: false
            }
        });

        // Smart TV Kumanda Desteği (OK Tuşu)
        document.addEventListener('keydown', function(e) {
            if(e.keyCode == 13 || e.keyCode == 32) { 
                if(player.paused()) { player.play(); } else { player.pause(); }
            }
        });

        // Hata durumunda otomatik yeniden bağlanma
        player.on('error', function() {
            setTimeout(function() {
                player.src({ src: 'https://mpu.zirvedesin216.cfd/zirve/mono.m3u8', type: 'application/x-mpegURL' });
                player.load();
                player.play();
            }, 5000);
        });
    </script>
</body>
</html>
