<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zirve Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; cursor: pointer; }
        
        /* ÖZEL BAŞLAT BUTONU (VİDEO ÜZERİNDE) */
        #playBtn {
            position: absolute;
            width: 100px; height: 100px;
            background: rgba(229, 9, 20, 0.9);
            border-radius: 50%;
            border: 4px solid #fff;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #playBtn::after {
            content: '';
            display: block;
            width: 0; height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-left: 35px solid #fff;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <div id="playBtn"></div>
    <video id="video" controls></video>

    <script>
        var video = document.getElementById('video');
        var playBtn = document.getElementById('playBtn');
        var videoSrc = 'https://mpu.zirvedesin216.cfd/zirve/mono.m3u8';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari ve bazı eski LG WebOS sürümleri için yerel destek
            video.src = videoSrc;
        }

        // Başlat Butonuna Tıklama
        playBtn.onclick = function() {
            video.play();
            playBtn.style.display = 'none';
        };

        video.onplay = function() { playBtn.style.display = 'none'; };

        // Kumanda OK Tuşu
        document.addEventListener('keydown', function(e) {
            if (e.keyCode == 13) {
                if (video.paused) { video.play(); playBtn.style.display = 'none'; } 
                else { video.pause(); }
            }
        });
    </script>
</body>
</html>
