<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zirve Canlı Yayın</title>
    
    <link href="https://vjs.zencdn.net/8.3.0/video-js.min.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .video-js { width: 100vw !important; height: 100vh !important; }

        /* İSTEDİĞİN O BÜYÜK BAŞLAT BUTONU (Özel Tasarım) */
        .vjs-big-play-button {
            width: 100px !important;
            height: 100px !important;
            line-height: 100px !important;
            border-radius: 50% !important;
            background-color: rgba(0, 123, 255, 0.7) !important; /* Şık Mavi */
            border: 4px solid #fff !important;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            left: 50% !important;
            top: 50% !important;
            margin-left: -50px !important;
            margin-top: -50px !important;
            font-size: 3em !important;
        }
        .vjs-big-play-button:hover { background-color: #0056b3 !important; transform: scale(1.1); }
    </style>
</head>
<body>

    <video id="player" class="video-js vjs-theme-fantasy vjs-big-play-centered" controls preload="auto">
        <source src="https://mpu.zirvedesin216.cfd/zirve/mono.m3u8" type="application/x-mpegURL">
    </video>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script>
        var player = videojs('player', {
            autoplay: false,
            responsive: true,
            fluid: true,
            userActions: { hotkeys: true }
        });

        // TV Kumandası için OK tuşu desteği
        document.addEventListener('keydown', function(e) {
            if(e.keyCode == 13 || e.keyCode == 32) { 
                if(player.paused()) { player.play(); } else { player.pause(); }
            }
        });
    </script>
</body>
</html>
