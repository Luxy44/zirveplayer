<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Zirve TV Player</title>
    
    <!-- HLS.js Kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .player-container {
            width: 95%;
            max-width: 1200px;
            background: linear-gradient(145deg, #1e1e30, #252540);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(99, 102, 241, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 16/9;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 100px rgba(99, 102, 241, 0.03);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #c7d2fe;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            z-index: 15;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .play-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .play-button {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.5);
        }

        .play-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 50px rgba(99, 102, 241, 0.7);
        }

        .play-button:active {
            transform: scale(0.95);
        }

        .play-button svg {
            width: 40px;
            height: 40px;
            fill: white;
            margin-left: 8px;
        }

        .play-instruction {
            color: #c7d2fe;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            padding: 0 20px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 15px;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-btn {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(139, 92, 246, 0.3));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: white;
        }

        .control-btn:hover {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .control-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .volume-slider {
            width: 100px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.5);
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-size: 12px;
            color: #a5b4fc;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.green { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .status-dot.yellow { background: #eab308; box-shadow: 0 0 10px #eab308; }
        .status-dot.red { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .error-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .error-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .error-text {
            color: #fca5a5;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 20px;
        }

        .retry-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(99, 102, 241, 0.5);
        }

        @media (max-width: 768px) {
            .player-container {
                width: 100%;
                border-radius: 0;
                padding: 10px;
            }

            .header {
                flex-direction: column;
                gap: 10px;
            }

            .logo-text {
                font-size: 20px;
            }

            .controls {
                flex-direction: column;
                gap: 15px;
            }

            .volume-slider {
                width: 150px;
            }

            .video-wrapper {
                border-radius: 10px;
            }

            .play-button {
                width: 80px;
                height: 80px;
            }

            .play-button svg {
                width: 32px;
                height: 32px;
            }
        }

        .video-wrapper:fullscreen,
        .video-wrapper:-webkit-full-screen {
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }

        .video-wrapper:fullscreen #video,
        .video-wrapper:-webkit-full-screen #video {
            width: 100%;
            height: 100%;
        }

        @media (min-width: 1400px) {
            .player-container {
                max-width: 1400px;
                padding: 30px;
            }

            .logo-text {
                font-size: 28px;
            }

            .control-btn {
                width: 55px;
                height: 55px;
            }
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📺</div>
                <span class="logo-text">Zirve TV Player</span>
            </div>
            <div class="live-badge">
                <span class="live-dot"></span>
                <span>Canlı Yayın</span>
            </div>
        </div>

        <div class="video-wrapper" id="videoWrapper">
            <video id="video" playsinline webkit-playsinline muted></video>
            
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="loading-text">Yayın hazırlanıyor...</div>
            </div>

            <div class="play-overlay" id="playOverlay">
                <div class="play-button" id="playButton">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
                <div class="play-instruction">Yayını başlatmak için tıklayın</div>
            </div>

            <div class="error-overlay" id="errorOverlay">
                <div class="error-icon">⚠️</div>
                <div class="error-text">Yayına bağlanılamadı</div>
                <button class="retry-btn" id="retryBtn">Tekrar Dene</button>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <button class="control-btn" id="playPauseBtn" title="Oynat/Duraklat">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>

                <button class="control-btn" id="muteBtn" title="Sessiz">
                    <svg id="volumeIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <svg id="muteIcon" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>

                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="1">
            </div>

            <div class="control-group">
                <button class="control-btn" id="refreshBtn" title="Yenile">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>

                <button class="control-btn" id="fullscreenBtn" title="Tam Ekran">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot yellow" id="statusDot"></span>
                <span id="statusText">Hazırlanıyor...</span>
            </div>
            <div class="status-item">
                <span>📊</span>
                <span id="qualityText">Otomatik</span>
            </div>
            <div class="status-item">
                <span>⏱️</span>
                <span id="bufferText">Buffer: 0s</span>
            </div>
        </div>
    </div>

    <script>
        const STREAM_URL = 'https://ejr.zirvedesin218.cfd/zirve/mono.m3u8';

        const video = document.getElementById('video');
        const videoWrapper = document.getElementById('videoWrapper');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const playOverlay = document.getElementById('playOverlay');
        const errorOverlay = document.getElementById('errorOverlay');
        const playButton = document.getElementById('playButton');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const muteBtn = document.getElementById('muteBtn');
        const volumeIcon = document.getElementById('volumeIcon');
        const muteIcon = document.getElementById('muteIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const retryBtn = document.getElementById('retryBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const qualityText = document.getElementById('qualityText');
        const bufferText = document.getElementById('bufferText');

        let hls = null;
        let isPlayerReady = false;
        let userInteracted = false;

        function showLoading() {
            loadingOverlay.classList.remove('hidden');
        }

        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }

        function showPlayOverlay() {
            playOverlay.classList.remove('hidden');
        }

        function hidePlayOverlay() {
            playOverlay.classList.add('hidden');
        }

        function showError(message) {
            document.querySelector('.error-text').textContent = message;
            errorOverlay.classList.add('show');
            setDisconnected();
        }

        function hideError() {
            errorOverlay.classList.remove('show');
        }

        function setConnected() {
            statusDot.className = 'status-dot green';
            statusText.textContent = 'Bağlı';
        }

        function setReconnecting() {
            statusDot.className = 'status-dot yellow';
            statusText.textContent = 'Bağlanıyor...';
        }

        function setDisconnected() {
            statusDot.className = 'status-dot red';
            statusText.textContent = 'Bağlantı Kesildi';
        }

        function updatePlayPauseIcon() {
            if (video.paused) {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            } else {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            }
        }

        function updateMuteIcon() {
            if (video.muted || video.volume === 0) {
                volumeIcon.style.display = 'none';
                muteIcon.style.display = 'block';
            } else {
                volumeIcon.style.display = 'block';
                muteIcon.style.display = 'none';
            }
        }

        function updateBufferInfo() {
            if (video.buffered.length > 0) {
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                const bufferAhead = Math.max(0, Math.round(bufferedEnd - video.currentTime));
                bufferText.textContent = `Buffer: ${bufferAhead}s`;
            }
        }

        function initHLS() {
            console.log('HLS başlatılıyor...');
            
            if (hls) {
                hls.destroy();
            }

            hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 90,
                maxBufferLength: 30,
                maxMaxBufferLength: 600,
                maxBufferSize: 60 * 1000 * 1000,
                maxBufferHole: 0.5,
                highBufferWatchdogPeriod: 2,
                nudgeOffset: 0.1,
                nudgeMaxRetry: 5,
                maxFragLookUpTolerance: 0.25,
                liveSyncDurationCount: 3,
                liveMaxLatencyDurationCount: 10,
                liveDurationInfinity: true,
                startLevel: -1,
                fragLoadingTimeOut: 20000,
                fragLoadingMaxRetry: 10,
                fragLoadingRetryDelay: 1000,
                manifestLoadingTimeOut: 10000,
                manifestLoadingMaxRetry: 10,
                manifestLoadingRetryDelay: 1000,
            });

            hls.loadSource(STREAM_URL);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
                console.log('Manifest başarıyla yüklendi, seviye sayısı:', data.levels.length);
                isPlayerReady = true;
                hideLoading();
                showPlayOverlay();
                setReconnecting();
            });

            hls.on(Hls.Events.LEVEL_SWITCHED, function(event, data) {
                if (hls.levels[data.level]) {
                    const level = hls.levels[data.level];
                    const quality = level.height ? `${level.height}p` : 'Auto';
                    qualityText.textContent = quality;
                }
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                console.error('HLS Hatası:', data.type, data.details);
                
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.log('Ağ hatası, yeniden bağlanıyor...');
                            setTimeout(() => {
                                hls.loadSource(STREAM_URL);
                                hls.startLoad();
                            }, 2000);
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.log('Medya hatası, kurtarılıyor...');
                            hls.recoverMediaError();
                            break;
                        default:
                            console.log('Ciddi hata, yeniden başlatılıyor...');
                            setTimeout(() => initHLS(), 3000);
                            break;
                    }
                }
            });
        }

        function initNativeHLS() {
            console.log('Native HLS başlatılıyor...');
            video.src = STREAM_URL;

            video.addEventListener('loadedmetadata', function() {
                console.log('Native HLS metadata yüklendi');
                isPlayerReady = true;
                hideLoading();
                showPlayOverlay();
                setReconnecting();
            });

            video.addEventListener('error', function(e) {
                console.error('Native HLS hatası:', e);
                showError('Yayın yüklenemedi');
            });

            video.load();
        }

        function startPlayer() {
            console.log('Player başlatılıyor...');
            showLoading();
            hideError();
            setReconnecting();

            if (Hls.isSupported()) {
                console.log('HLS.js destekleniyor');
                initHLS();
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                console.log('Native HLS destekleniyor');
                initNativeHLS();
            } else {
                showError('Bu tarayıcı desteklenmiyor');
            }
        }

        function playVideo() {
            if (!isPlayerReady) {
                console.log('Player henüz hazır değil');
                return;
            }

            console.log('Video oynatılmaya çalışılıyor...');
            userInteracted = true;
            
            // Sesi aç
            video.muted = false;
            video.volume = 1;
            volumeSlider.value = 1;
            
            const playPromise = video.play();
            
            if (playPromise !== undefined) {
                playPromise
                    .then(() => {
                        console.log('✅ Video başarıyla oynatılıyor');
                        hidePlayOverlay();
                        hideLoading();
                        setConnected();
                        updatePlayPauseIcon();
                        updateMuteIcon();
                    })
                    .catch((error) => {
                        console.error('❌ Oynatma hatası:', error);
                        showError('Video oynatılamadı. Lütfen tekrar deneyin.');
                    });
            }
        }

        // Play overlay tıklama
        playOverlay.addEventListener('click', playVideo);
        playButton.addEventListener('click', playVideo);

        // Play/Pause butonu
        playPauseBtn.addEventListener('click', () => {
            if (!userInteracted) {
                playVideo();
            } else {
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            }
        });

        video.addEventListener('play', () => {
            updatePlayPauseIcon();
            setConnected();
        });

        video.addEventListener('pause', updatePlayPauseIcon);

        video.addEventListener('playing', () => {
            hideLoading();
            hidePlayOverlay();
            setConnected();
        });

        video.addEventListener('waiting', () => {
            if (userInteracted) {
                showLoading();
            }
        });

        video.addEventListener('stalled', () => {
            console.log('Video durdu');
            setReconnecting();
        });

        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            updateMuteIcon();
            volumeSlider.value = video.muted ? 0 : video.volume;
        });

        volumeSlider.addEventListener('input', (e) => {
            video.volume = e.target.value;
            video.muted = e.target.value === '0';
            updateMuteIcon();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else if (videoWrapper.requestFullscreen) {
                videoWrapper.requestFullscreen();
            } else if (videoWrapper.webkitRequestFullscreen) {
                videoWrapper.webkitRequestFullscreen();
            } else if (video.webkitEnterFullscreen) {
                video.webkitEnterFullscreen();
            }
        });

        refreshBtn.addEventListener('click', () => {
            location.reload();
        });

        retryBtn.addEventListener('click', () => {
            hideError();
            startPlayer();
        });

        setInterval(updateBufferInfo, 1000);

        document.addEventListener('keydown', (e) => {
            if (!userInteracted) return;
            
            switch(e.key.toLowerCase()) {
                case ' ':
                case 'k':
                    e.preventDefault();
                    video.paused ? video.play() : video.pause();
                    break;
                case 'f':
                    fullscreenBtn.click();
                    break;
                case 'm':
                    muteBtn.click();
                    break;
                case 'arrowup':
                    e.preventDefault();
                    video.volume = Math.min(1, video.volume + 0.1);
                    volumeSlider.value = video.volume;
                    video.muted = false;
                    updateMuteIcon();
                    break;
                case 'arrowdown':
                    e.preventDefault();
                    video.volume = Math.max(0, video.volume - 0.1);
                    volumeSlider.value = video.volume;
                    updateMuteIcon();
                    break;
            }
        });

        // Sayfa yüklendiğinde başlat
        window.addEventListener('load', startPlayer);
        
        // Eğer sayfa zaten yüklendiyse
        if (document.readyState === 'complete') {
            startPlayer();
        }
    </script>

</body>
</html>
