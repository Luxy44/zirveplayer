<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zirve Player v3.0</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.min.css" rel="stylesheet" />
    
    <style>
        /* Tam Ekran ve Siyah Arkaplan */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .video-js { width: 100vw !important; height: 100vh !important; }

        /* İSTEDİĞİN O BÜYÜK BAŞLAT BUTONU (TV UYUMLU) */
        .vjs-big-play-button {
            width: 90px !important;
            height: 90px !important;
            line-height: 90px !important;
            border-radius: 50% !important; /* Tam Yuvarlak */
            background-color: rgba(229, 9, 20, 0.9) !important; /* Canlı Kırmızı */
            border: 3px solid #fff !important;
            left: 50% !important;
            top: 50% !important;
            margin-left: -45px !important;
            margin-top: -45px !important;
            font-size: 3em !important;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
            transition: transform 0.2s ease !important;
        }
        
        /* Kumanda ile üzerine gelindiğinde büyüme efekti */
        .vjs-big-play-button:focus, .vjs-big-play-button:hover {
            transform: scale(1.15);
            background-color: #ff0000 !important;
        }

        /* Alt Kontrol Çubuğu Fontu (TV'de okunurluk için) */
        .vjs-control-bar { font-size: 1.1em; background: rgba(0,0,0,0.7) !important; }
    </style>
</head>
<body>

    <video id="zirve-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
        <source src="https://mpu.zirvedesin216.cfd/zirve/mono.m3u8" type="application/x-mpegURL">
    </video>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        var player = videojs('zirve-player', {
            autoplay: false, // Büyük butonu görmek için false kalsın
            responsive: true,
            fluid: true,
            html5: {
                vhs: { overrideNative: true }, // TV kısıtlamalarını aşmak için kritik ayar
                nativeAudioTracks: false,
                nativeVideoTracks: false
            }
        });

        // Smart TV Kumandası OK/Enter Tuşu Desteği
        document.addEventListener('keydown', function(e) {
            if(e.keyCode == 13 || e.keyCode == 32) { // OK veya Boşluk tuşu
                if(player.paused()) { 
                    player.play(); 
                } else { 
                    player.pause(); 
                }
            }
        });

        // Hata oluşursa (Yayın koparsa) 5 saniye sonra otomatik tekrar dene
        player.on('error', function() {
            setTimeout(function() {
                player.src({ src: 'https://mpu.zirvedesin216.cfd/zirve/mono.m3u8', type: 'application/x-mpegURL' });
                player.load();
                player.play();
            }, 5000);
        });
    </script>
</body>
</html>
