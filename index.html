<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zirve Premium v10</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        video { width: 100%; height: 100%; background: #000; }

        /* O MEŞHUR BÜYÜK KIRMIZI BUTON */
        #playBtn {
            position: absolute;
            width: 130px; height: 130px;
            background: #e50914; /* Netflix Kırmızısı */
            border-radius: 50%;
            border: 6px solid #fff;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 9999;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.7);
            transition: transform 0.2s;
        }
        #playBtn:hover { transform: scale(1.1); }
        #playBtn::after {
            content: '';
            width: 0; height: 0;
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-left: 45px solid #fff;
            margin-left: 15px;
        }
        #status { color: #fff; position: absolute; bottom: 10%; font-family: sans-serif; font-size: 14px; opacity: 0.5; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div id="playBtn"></div>
    <div id="status">BAĞLANTI BEKLENİYOR...</div>
    <video id="video" playsinline crossorigin="anonymous"></video>

    <script>
        const video = document.getElementById('video');
        const playBtn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        const streamUrl = "https://mpu.zirvedesin216.cfd/zirve/mono.m3u8";

        function startPlayer() {
            if (Hls.isSupported()) {
                const hls = new Hls({
                    xhrSetup: function(xhr) {
                        xhr.withCredentials = false; // Güvenlik engelini esnetir
                    },
                    manifestLoadingMaxRetry: 15, // 15 kez bağlanmaya zorlar
                    manifestLoadingRetryDelay: 1000,
                    enableWorker: true,
                    startLevel: -1 // En uygun kaliteyle başlar
                });

                hls.loadSource(streamUrl);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    status.innerText = "YAYIN HAZIR";
                    video.play();
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        status.innerText = "BAĞLANTI HATASI, TEKRAR DENENİYOR...";
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                video.src = streamUrl; // Yerel oynatıcıya zorla
                                video.play();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari ve bazı LG/Samsung TV yerel oynatıcı desteği
                video.src = streamUrl;
                video.play();
            }
        }

        // Başlat Butonuna Tıklama / OK Tuşu
        playBtn.addEventListener('click', () => {
            playBtn.style.display = 'none';
            status.innerText = "YAYIN YÜKLENİYOR...";
            startPlayer();
        });

        // Smart TV Kumanda OK Tuşu Desteği
        document.addEventListener('keydown', (e) => {
            if (e.keyCode === 13) { // OK Tuşu
                if (playBtn.style.display !== 'none') {
                    playBtn.click();
                } else {
                    video.paused ? video.play() : video.pause();
                }
            }
        });
    </script>
</body>
</html>
